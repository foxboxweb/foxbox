<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FoxBox WebTV</title>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
body{
    margin:0;
    background:#0b0b0b;
    display:flex;
    justify-content:center;
    font-family:Arial;
}
.wrapper{
    width:1000px;
    text-align:center;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- NAVBAR SWF -->
    <object width="900" height="120">
        <param name="movie" value="main-nav.swf">
        <embed src="main-nav.swf" width="900" height="120">
    </object>

    <br><br>

    <!-- PLAYER -->
    <iframe 
        src="https://new.opencaster.com/player/embed?user=FoxBoxWeb"
        width="900"
        height="500"
        frameborder="0"
        allowfullscreen>
    </iframe>

</div>

</body>
</html>
